<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sealed Scout"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Sealed Scout</title>
<style>
/* ── Reset & tokens ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0e0e18;
  --card:#181826;
  --lift:#212134;
  --rim:#ffffff0f;
  --bronze:#b8812a;
  --bronze2:#d4a245;
  --foil:linear-gradient(135deg,#b8812a,#e8c96a,#b8812a);
  --parch:#ede4ce;
  --dim:#6b6880;
  --deal:#3ecf72;
  --over:#e05c5c;
  --warn:#f0b429;
  --blue:#4a9eca;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
}
html{height:100%;background:var(--ink);overscroll-behavior:none}
body{min-height:100dvh;background:var(--ink);color:var(--parch);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── Header ─────────────────────────────────────────────────────── */
.hdr{
  padding:calc(var(--st) + 12px) calc(var(--sr) + 16px) 12px calc(var(--sl) + 16px);
  background:linear-gradient(180deg,#13131f 0%,var(--ink) 100%);
  border-bottom:1px solid var(--rim);flex-shrink:0
}
.hdr-in{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.wordmark{display:flex;align-items:center;gap:8px}
.wordmark svg{width:26px;height:26px;flex-shrink:0}
.wordmark h1{
  font-size:20px;font-weight:700;letter-spacing:-.4px;
  background:var(--foil);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text
}
.store-pill{
  font-size:11px;color:var(--dim);background:var(--card);
  border:1px solid var(--rim);border-radius:20px;padding:4px 10px;
  white-space:nowrap
}
.store-pill b{color:var(--bronze2)}

/* ── Search bar ─────────────────────────────────────────────────── */
.srch-wrap{
  padding:12px calc(var(--sr)+16px) 10px calc(var(--sl)+16px);
  background:var(--card);border-bottom:1px solid var(--rim);flex-shrink:0
}
.srch-in{max-width:700px;margin:0 auto}
.type-row{display:flex;gap:7px;margin-bottom:10px}
.tpill{
  padding:6px 14px;border-radius:18px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;transition:all .15s
}
.tpill.on{background:var(--bronze);color:#0e0e18}
.tpill.off{background:var(--lift);color:var(--dim)}
.input-row{display:flex;gap:8px;align-items:stretch}
.ibox{flex:1;position:relative}
.si{
  width:100%;height:44px;background:var(--ink);
  border:1.5px solid #2e2e45;border-radius:10px;
  padding:0 14px;color:var(--parch);font-size:16px;
  font-family:inherit;outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none
}
.si:focus{border-color:var(--bronze)}
.si::placeholder{color:#3a3a52}
.drop{
  position:absolute;top:calc(100%+5px);left:0;right:0;
  background:var(--lift);border:1px solid #b8812a44;
  border-radius:10px;z-index:100;max-height:240px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 16px 40px #00000088;display:none
}
.ditem{
  padding:11px 14px;font-size:15px;color:var(--parch);
  cursor:pointer;border-bottom:1px solid var(--rim)
}
.ditem:last-child{border-bottom:none}
.ditem:active{background:#b8812a18;color:var(--bronze2)}
.go{
  height:44px;padding:0 18px;border-radius:10px;border:none;
  background:var(--bronze);color:#0e0e18;font-weight:700;
  font-size:14px;font-family:inherit;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:opacity .15s
}
.go:disabled{background:var(--lift);color:#3a3a52;cursor:default}
.go:not(:disabled):active{opacity:.75}

/* ── Scroll area ─────────────────────────────────────────────────── */
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px calc(var(--sr)+16px) calc(var(--sb)+24px) calc(var(--sl)+16px)
}
.inner{max-width:700px;margin:0 auto}

/* ── Loading ─────────────────────────────────────────────────────── */
.loading{display:flex;flex-direction:column;align-items:center;padding:56px 20px;gap:14px}
.ring{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--lift);border-top-color:var(--bronze);
  animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{color:var(--bronze2);font-size:13px;font-weight:600}
.load-sub{color:var(--dim);font-size:11px;text-align:center;line-height:1.8;max-width:300px}

/* ── Best-price hero ─────────────────────────────────────────────── */
.hero{
  background:linear-gradient(135deg,#1c1a10,#16141e);
  border:1px solid #b8812a55;border-radius:14px;
  padding:16px 18px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px
}
.hero-left{}
.hero-eyebrow{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.hero-price{font-size:34px;font-weight:800;letter-spacing:-.5px;color:var(--deal);line-height:1}
.hero-from{font-size:12px;color:var(--dim);margin-top:4px}
.hero-from b{color:var(--parch)}
.hero-right{text-align:right}
.hero-msrp{font-size:11px;color:var(--dim);margin-bottom:3px}
.hero-saving{font-size:18px;font-weight:700;color:var(--bronze2)}

/* ── Stats row ───────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--rim);border-radius:11px;padding:10px 12px;text-align:center}
.stat-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.stat-val{font-size:18px;font-weight:800;letter-spacing:-.3px}
.stat-sub{font-size:9px;color:var(--dim);margin-top:2px}

/* ── Section header ──────────────────────────────────────────────── */
.sec{display:flex;align-items:center;gap:9px;margin:16px 0 10px}
.sec span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);white-space:nowrap}
.sec::after{content:'';flex:1;height:1px;background:var(--rim)}

/* ── Price cards grid ────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));gap:9px}

/* ── Price card ──────────────────────────────────────────────────── */
.pcard{
  background:var(--card);border-radius:12px;padding:13px 14px;
  border:1px solid var(--rim);position:relative;overflow:hidden;
  transition:transform .12s
}
.pcard:active{transform:scale(.97)}
.pcard.best{border-color:#3ecf7255}
.pcard.close{border-color:#b8812a33}
.pcard.over{border-color:#e05c5c22}

/* Signature element: the deal-quality strip at top of each card */
.deal-strip{
  position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:12px 12px 0 0
}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:8px}
.retailer-name{font-size:11px;font-weight:700;color:var(--parch);letter-spacing:.01em;line-height:1.3}
.delta-chip{
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;
  white-space:nowrap;flex-shrink:0;margin-top:1px
}
.delta-chip.g{background:#3ecf7222;color:var(--deal)}
.delta-chip.y{background:#f0b42922;color:var(--warn)}
.delta-chip.r{background:#e05c5c22;color:var(--over)}

.card-price{font-size:22px;font-weight:800;color:var(--parch);letter-spacing:-.3px;margin-bottom:2px}
.card-msrp{font-size:10px;color:var(--dim);text-decoration:line-through;margin-bottom:4px}
.card-ship{font-size:10px;color:var(--dim);margin-bottom:6px}
.card-ship.free{color:#3ecf7288}

/* The deal bar — fills proportionally vs best price */
.deal-bar-wrap{background:var(--lift);border-radius:3px;height:3px;overflow:hidden;margin-bottom:8px}
.deal-bar{height:100%;border-radius:3px;transition:width .5s ease}

.card-link a{
  font-size:10px;color:var(--blue);text-decoration:none;
  display:inline-flex;align-items:center;gap:3px
}

/* ── TCGPlayer link card ─────────────────────────────────────────── */
.tcg-card{
  background:var(--card);border:1px solid #E6A81744;
  border-radius:12px;padding:13px 14px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap
}
.tcg-left{}
.tcg-eyebrow{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.tcg-label{font-size:13px;font-weight:700;color:#E6A817}
.tcg-note{font-size:10px;color:var(--dim);margin-top:2px}
.tcg-btn{
  padding:8px 14px;border-radius:9px;border:1px solid #E6A81766;
  background:#E6A81711;color:#E6A817;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer;white-space:nowrap;text-decoration:none;
  display:inline-block
}

/* ── Empty state ─────────────────────────────────────────────────── */
.empty{text-align:center;padding:52px 16px}
.empty-glyph{font-size:48px;margin-bottom:14px;opacity:.6}
.empty-hed{font-size:16px;font-weight:700;color:var(--parch);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:20px}
.quick{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.qpill{
  padding:7px 14px;border-radius:18px;border:1px solid #2e2e45;
  background:var(--card);color:var(--dim);font-size:12px;
  font-family:inherit;cursor:pointer
}
.qpill:active{border-color:var(--bronze);color:var(--bronze2)}

/* ── No results ──────────────────────────────────────────────────── */
.nores{
  background:var(--card);border:1px solid var(--rim);border-radius:12px;
  padding:28px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7
}

/* ── Error ───────────────────────────────────────────────────────── */
.errbox{
  background:#1c0f0f;border:1px solid #e05c5c44;border-radius:12px;
  padding:14px 16px;color:var(--over);font-size:13px;margin-bottom:12px
}

/* ── Footer note ─────────────────────────────────────────────────── */
.footnote{margin-top:20px;font-size:10px;color:#3a3a52;text-align:center;line-height:1.7}

/* ── Install banner (shown only in browser, hidden when installed) ── */
.install-banner{
  background:linear-gradient(135deg,#1c1a10,#16141e);
  border-bottom:1px solid #b8812a44;
  padding:10px calc(var(--sr)+16px) 10px calc(var(--sl)+16px);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-shrink:0
}
.install-banner p{font-size:11px;color:var(--dim);line-height:1.5}
.install-banner b{color:var(--bronze2)}
.install-banner.hidden{display:none}
</style>
</head>
<body>

<!-- Install banner — visible in Safari browser, hidden once installed to home screen -->
<div class="install-banner" id="installBanner">
  <p>📲 <b>Add to Home Screen:</b> tap Share (↑) → "Add to Home Screen" to install as an app</p>
  <button onclick="document.getElementById('installBanner').classList.add('hidden')"
    style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px">✕</button>
</div>

<!-- Header -->
<header class="hdr">
  <div class="hdr-in">
    <div class="wordmark">
      <!-- Sword icon -->
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2 L15 12 L24 14 L15 16 L13 24 L11 16 L2 14 L11 12 Z" fill="#b8812a" opacity=".3"/>
        <path d="M13 4 L20 22 M13 4 L6 22" stroke="#b8812a" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 14 L18 14" stroke="#d4a245" stroke-width="2" stroke-linecap="round"/>
        <circle cx="13" cy="13" r="1.5" fill="#e8c96a"/>
      </svg>
      <h1>Sealed Scout</h1>
    </div>
    <div class="store-pill" id="storePill">Loading…</div>
  </div>
</header>

<!-- Search -->
<div class="srch-wrap">
  <div class="srch-in">
    <div class="type-row" id="typeRow"></div>
    <div class="input-row">
      <div class="ibox">
        <input class="si" type="text" id="si" placeholder="Set name — e.g. Bloomburrow…"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <div class="drop" id="drop"></div>
      </div>
      <button class="go" id="goBtn" disabled>Search</button>
    </div>
  </div>
</div>

<!-- Scroll content -->
<div class="scroll">
  <div class="inner" id="content"></div>
</div>

<script>
'use strict';

// ── Store list ──────────────────────────────────────────────────────────────
// All confirmed Shopify stores that allow CORS on /products.json
const STORES = [
  {name:"Geekery Games",         d:"geekerygames.com",           free:75,  flat:5.99},
  {name:"Flipside Gaming",       d:"flipsidegaming.com",         free:100, flat:5.99},
  {name:"ABUGames",              d:"abugames.com",               free:75,  flat:5.99},
  {name:"AncestralMTG",          d:"ancestralmtg.com",           free:50,  flat:4.99},
  {name:"Mox Boarding House",    d:"www.moxboardinghouse.com",   free:100, flat:6.99},
  {name:"Cash Cards Unlimited",  d:"cashcardsunlimited.com",     free:99,  flat:4.99},
  {name:"MysteryMTG",            d:"mysterymtg.com",             free:75,  flat:5.99},
  {name:"Moonshot Games",        d:"moonshotgamestore.com",      free:50,  flat:5.99},
  {name:"Nerd Rage Gaming",      d:"www.nerdragegaming.com",     free:75,  flat:5.99},
  {name:"ChannelFireball",       d:"channelfireball.com",        free:100, flat:5.99},
  {name:"CoolStuffInc",          d:"www.coolstuffinc.com",       free:100, flat:3.99},
  {name:"GameNerdz",             d:"www.gamenerdz.com",          free:100, flat:4.99},
  {name:"Card Kingdom",          d:"www.cardkingdom.com",        free:50,  flat:4.99},
  {name:"StarCityGames",         d:"starcitygames.com",          free:100, flat:4.99},
];

const MSRP = {"Booster Box":144, "Collector Booster Box":239};
const TYPES = ["Booster Box","Collector Booster Box"];
const QUICK = ["Bloomburrow","Duskmourn","Tarkir: Dragonstorm","Final Fantasy","Foundations","Aetherdrift"];
const SETS = [
  "Tarkir: Dragonstorm","Aetherdrift","Foundations","Duskmourn","Bloomburrow",
  "Outlaws of Thunder Junction","Murders at Karlov Manor","The Lost Caverns of Ixalan",
  "Wilds of Eldraine","March of the Machine","Phyrexia: All Will Be One",
  "The Brothers' War","Dominaria United","Commander Masters","The Lord of the Rings",
  "Streets of New Capenna","Kamigawa: Neon Dynasty","Innistrad: Crimson Vow",
  "Midnight Hunt","Adventures in the Forgotten Realms","Strixhaven","Kaldheim",
  "Zendikar Rising","Ikoria","Throne of Eldraine","Final Fantasy",
  "Marvel: Spider-Man","Edge of Eternities","Avatar: The Last Airbender",
];

// ── State ───────────────────────────────────────────────────────────────────
let selType = "Booster Box";
let lastSet = "", lastType = "";

// ── DOM refs ────────────────────────────────────────────────────────────────
const si      = document.getElementById("si");
const drop    = document.getElementById("drop");
const goBtn   = document.getElementById("goBtn");
const content = document.getElementById("content");

// ── Install banner ──────────────────────────────────────────────────────────
// Hide if already running as standalone (installed to home screen)
if (window.navigator.standalone === true) {
  document.getElementById("installBanner").classList.add("hidden");
}

// ── Store count pill ────────────────────────────────────────────────────────
document.getElementById("storePill").innerHTML = `<b>${STORES.length}</b> LGS stores`;

// ── Type tabs ───────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById("typeRow").innerHTML = TYPES.map(t =>
    `<button class="tpill ${t===selType?"on":"off"}" onclick="setType('${t}')">${t}</button>`
  ).join("");
}
function setType(t) { selType = t; renderTabs(); }
renderTabs();

// ── Autocomplete ─────────────────────────────────────────────────────────────
si.addEventListener("input", () => { goBtn.disabled = !si.value.trim(); showDrop(); });
si.addEventListener("focus", showDrop);
si.addEventListener("keydown", e => {
  if (e.key === "Enter") { drop.style.display="none"; doSearch(); }
  if (e.key === "Escape") drop.style.display = "none";
});
document.addEventListener("touchstart", e => {
  if (!e.target.closest(".ibox")) drop.style.display = "none";
}, {passive:true});

function showDrop() {
  const q = si.value.toLowerCase().trim();
  const hits = q ? SETS.filter(s => s.toLowerCase().includes(q)) : SETS;
  if (!hits.length) { drop.style.display="none"; return; }
  drop.innerHTML = hits.slice(0,12).map(s =>
    `<div class="ditem" onmousedown="pickSet('${s.replace(/'/g,"\\'")}')">
       ${s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi"), "<b>$1</b>")}
     </div>`
  ).join("");
  drop.style.display = "block";
}
function pickSet(s) { si.value = s; drop.style.display="none"; goBtn.disabled=false; }
goBtn.addEventListener("click", doSearch);

// ── Score how well a product title matches what we want ──────────────────────
function score(title, setName, isCollector) {
  const t = title.toLowerCase(), s = setName.toLowerCase();
  let sc = 0;
  const words = s.split(/\s+/).filter(w => w.length > 2);
  sc += (words.filter(w => t.includes(w)).length / Math.max(words.length,1)) * 50;
  if (isCollector) { sc += t.includes("collector") ? 30 : -35; }
  else             { sc -= t.includes("collector") ? 40 : 0; }
  if (t.includes("box")) sc += 12;
  if (t.includes("booster")) sc += 8;
  if (t.match(/commander|precon|bundle|starter|single|case/)) sc -= 25;
  return sc;
}

// ── Fetch one store ──────────────────────────────────────────────────────────
async function fetchStore(store, setName, isCollector) {
  const q = encodeURIComponent(`${setName} booster`);
  const url = `https://${store.d}/products.json?limit=50&q=${q}`;
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if (!r.ok) return null;
    const data = await r.json();
    if (!Array.isArray(data?.products)) return null;

    const best = data.products
      .map(p => ({p, sc: score(p.title, setName, isCollector)}))
      .filter(x => x.sc >= 32)
      .sort((a,b) => b.sc - a.sc)[0];

    if (!best) return null;

    const avail = (best.p.variants||[]).filter(v => v.available !== false && parseFloat(v.price) > 0);
    if (!avail.length) return null;

    const cheapest = avail.sort((a,b) => parseFloat(a.price)-parseFloat(b.price))[0];
    const price = parseFloat(cheapest.price);
    if (isNaN(price) || price < 5) return null;

    return {
      name: store.name,
      price,
      title: best.p.title,
      shipping: price >= store.free ? "free" : store.flat,
      url: `https://${store.d}/products/${best.p.handle}`,
      inStock: true,
    };
  } catch { return null; }
}

// ── Main search ──────────────────────────────────────────────────────────────
async function doSearch() {
  const set = si.value.trim();
  if (!set) return;
  drop.style.display = "none";
  lastSet = set; lastType = selType;
  const isCollector = selType.toLowerCase().includes("collector");
  const msrp = MSRP[selType];

  showLoading(set);

  // Fire all stores concurrently, collect as they resolve
  const promises = STORES.map(s => fetchStore(s, set, isCollector));
  let results = (await Promise.all(promises)).filter(Boolean);

  // Sort by price ascending
  results.sort((a,b) => a.price - b.price);

  if (!results.length) {
    showNoResults(set, selType);
    return;
  }

  renderResults(results, msrp, set, selType, isCollector);
}

// ── Render results ───────────────────────────────────────────────────────────
function renderResults(results, msrp, setName, productType, isCollector) {
  const best      = results[0];
  const prices    = results.map(r => r.price);
  const avg       = prices.reduce((a,b)=>a+b,0)/prices.length;
  const savings   = msrp ? msrp - best.price : null;
  const savingPct = msrp ? Math.round((1-best.price/msrp)*100) : null;

  // TCGPlayer search URL
  const tcgQ = encodeURIComponent(`${setName} ${isCollector?"collector booster box":"booster box"}`);
  const tcgUrl = `https://www.tcgplayer.com/search/magic/product?productLineName=magic&q=${tcgQ}&view=grid&productTypeName=Booster+Box`;

  let html = `
    <!-- Best price hero -->
    <div class="hero">
      <div class="hero-left">
        <div class="hero-eyebrow">Best price found</div>
        <div class="hero-price">$${best.price.toFixed(2)}</div>
        <div class="hero-from">at <b>${best.name}</b>${best.shipping==="free"?" · Free shipping":""}</div>
      </div>
      <div class="hero-right">
        ${msrp ? `<div class="hero-msrp">MSRP $${msrp}</div>
        <div class="hero-saving">${savingPct > 0 ? `Save ${savingPct}%` : savingPct < 0 ? `+${Math.abs(savingPct)}% over MSRP` : "= MSRP"}</div>` : ""}
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats">
      <div class="stat">
        <div class="stat-lbl">Lowest</div>
        <div class="stat-val" style="color:var(--deal)">$${best.price.toFixed(2)}</div>
        <div class="stat-sub">${best.name.split(" ")[0]}</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Average</div>
        <div class="stat-val" style="color:var(--bronze2)">$${avg.toFixed(2)}</div>
        <div class="stat-sub">${results.length} stores</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">MSRP</div>
        <div class="stat-val" style="color:var(--dim)">${msrp ? "$"+msrp : "—"}</div>
        <div class="stat-sub">suggested</div>
      </div>
    </div>

    <!-- TCGPlayer link -->
    <div class="tcg-card">
      <div class="tcg-left">
        <div class="tcg-eyebrow">Marketplace reference</div>
        <div class="tcg-label">TCGPlayer</div>
        <div class="tcg-note">Check current marketplace listings</div>
      </div>
      <a class="tcg-btn" href="${tcgUrl}" target="_blank" rel="noopener">Search TCGPlayer →</a>
    </div>

    <!-- LGS results -->
    <div class="sec"><span>LGS Stores (${results.length})</span></div>
    <div class="grid">
  `;

  for (const r of results) {
    const delta    = Math.round((1 - r.price / best.price) * 100); // % above best
    const vsMSRP   = msrp ? Math.round((1-r.price/msrp)*100) : null;
    const isBest   = r.price === best.price;

    // Strip color: green = best, amber = close, red = expensive
    const aboveBest = r.price - best.price;
    const stripColor = aboveBest === 0 ? "#3ecf72"
                     : aboveBest <= 5   ? "#b8812a"
                     : aboveBest <= 15  ? "#d4a245"
                     : "#555";

    // Bar fills inversely — best price = full bar, most expensive = thinnest
    const range = Math.max(...prices) - Math.min(...prices) || 1;
    const barW  = Math.round(100 - ((r.price - best.price) / range) * 80);

    const chipVal = vsMSRP !== null ? (vsMSRP > 0 ? `-${vsMSRP}%` : vsMSRP < 0 ? `+${Math.abs(vsMSRP)}%` : "=MSRP") : "";
    const chipCls = vsMSRP > 5 ? "g" : vsMSRP >= -5 ? "y" : "r";

    const cardCls = isBest ? "best" : aboveBest <= 8 ? "close" : "over";
    const shipTxt = r.shipping === "free" ? "Free shipping" : `+ $${r.shipping} shipping`;
    const shipCls = r.shipping === "free" ? "card-ship free" : "card-ship";

    html += `
      <div class="pcard ${cardCls}">
        <div class="deal-strip" style="background:${stripColor}"></div>
        <div class="card-top">
          <div class="retailer-name">${r.name}</div>
          ${chipVal ? `<div class="delta-chip ${chipCls}">${chipVal}</div>` : ""}
        </div>
        <div class="card-price">$${r.price.toFixed(2)}</div>
        ${msrp ? `<div class="card-msrp">MSRP $${msrp}</div>` : ""}
        <div class="${shipCls}">${shipTxt}</div>
        <div class="deal-bar-wrap">
          <div class="deal-bar" style="width:${barW}%;background:${stripColor}"></div>
        </div>
        <div class="card-link">
          <a href="${r.url}" target="_blank" rel="noopener">View listing ↗</a>
        </div>
      </div>`;
  }

  html += `</div>
    <p class="footnote">
      Prices from live Shopify store data · Always verify at checkout<br>
      ${results.filter(r=>r.shipping==="free").length} of ${results.length} stores offer free shipping on this order
    </p>`;

  content.innerHTML = html;
}

// ── Loading state ────────────────────────────────────────────────────────────
function showLoading(set) {
  content.innerHTML = `
    <div class="loading">
      <div class="ring"></div>
      <div class="load-msg">Searching for "${set}"</div>
      <div class="load-sub">Checking ${STORES.length} stores simultaneously<br>
        ${STORES.slice(0,4).map(s=>s.name).join(" · ")} + ${STORES.length-4} more
      </div>
    </div>`;
}

// ── No results ───────────────────────────────────────────────────────────────
function showNoResults(set, type) {
  content.innerHTML = `
    <div class="nores">
      <div style="font-size:28px;margin-bottom:10px">🔍</div>
      <div style="font-weight:700;color:var(--parch);margin-bottom:6px">No listings found</div>
      No stores returned results for "<b>${set}</b>" ${type}.<br><br>
      The set name might be slightly different, or stores may not have it in stock yet.
      Try a nearby set name, or check directly on TCGPlayer.
    </div>
    ${emptyQuickPicks()}`;
}

// ── Empty state ──────────────────────────────────────────────────────────────
function emptyQuickPicks() {
  return `
    <div class="sec" style="margin-top:20px"><span>Quick searches</span></div>
    <div class="quick">
      ${QUICK.map(s => `<button class="qpill" onclick="pickSet('${s}')">${s}</button>`).join("")}
    </div>`;
}

content.innerHTML = `
  <div class="empty">
    <div class="empty-glyph">⚔️</div>
    <div class="empty-hed">Find the best sealed price</div>
    <div class="empty-sub">Search any MTG set to compare prices across<br>${STORES.length} LGS online stores simultaneously</div>
    <div class="quick">
      ${QUICK.map(s => `<button class="qpill" onclick="pickSet('${s}')">${s}</button>`).join("")}
    </div>
  </div>`;
</script>
</body>
</html>
